<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teach Me Music — Chargement</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    #0b0907;
      --gold:  #d4aa50;
      --gold2: #f0cc78;
      --muted: #6b5e48;
      --ivory: #f5f0e2;
      --green: #3ddc84;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--ivory);
      font-family: 'Outfit', sans-serif;
      overflow: hidden;
    }

    /* Subtle background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 50% 0%,   rgba(80,50,10,0.45) 0%, transparent 65%),
        radial-gradient(ellipse 40% 40% at 20% 100%, rgba(60,30,5,0.3)  0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 80% 100%, rgba(60,30,5,0.3)  0%, transparent 60%);
      pointer-events: none;
    }

    /* Staff lines decoration (background) */
    .staff-bg {
      position: fixed;
      left: 0; right: 0;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      opacity: 0.04;
    }
    .staff-line {
      height: 1px;
      background: var(--gold);
      margin: 18px 0;
    }

    /* Center container */
    .center {
      position: relative;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      z-index: 1;
      padding: 2rem;
    }

    /* Treble clef */
    .clef {
      font-size: 9rem;
      line-height: 1;
      color: var(--gold);
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 1s ease 0.2s forwards;
      text-shadow: 0 0 60px rgba(212,170,80,0.4);
      margin-bottom: 0.2rem;
    }

    /* App title */
    .title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.8rem, 6vw, 5rem);
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.04em;
      line-height: 1.1;
      text-align: center;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 1s ease 0.5s forwards;
    }
    .title em {
      font-style: italic;
      color: var(--gold2);
    }

    /* Subtitle */
    .subtitle {
      font-size: clamp(0.85rem, 2vw, 1.05rem);
      color: var(--muted);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-top: 0.6rem;
      opacity: 0;
      animation: fadeIn 1s ease 1s forwards;
    }

    /* Separator */
    .sep {
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 2.2rem 0 2rem;
      opacity: 0;
      animation: fadeIn 0.8s ease 1.2s forwards;
    }

    /* Loading block */
    .loading-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      width: min(420px, 90vw);
      opacity: 0;
      animation: fadeIn 0.8s ease 1.4s forwards;
    }

    /* Status text */
    .status-text {
      font-size: 0.82rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      min-height: 1.4em;
      text-align: center;
      transition: color 0.5s;
    }
    .status-text.ready { color: var(--green); }

    /* Progress bar */
    .progress-wrap {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--gold), var(--gold2));
      width: 0%;
      transition: width 0.5s ease;
      box-shadow: 0 0 12px rgba(212,170,80,0.5);
    }

    /* Steps */
    .steps {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      width: 100%;
      margin-top: 0.4rem;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      font-size: 0.78rem;
      color: rgba(107,94,72,0.6);
      transition: color 0.4s;
    }
    .step.active  { color: var(--gold2); }
    .step.done    { color: var(--green); }
    .step-icon {
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 1.5px solid currentColor;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem;
      flex-shrink: 0;
      transition: background 0.3s, border-color 0.3s;
    }
    .step.done .step-icon {
      background: var(--green);
      border-color: var(--green);
      color: #0b0907;
    }
    .step.active .step-icon { border-color: var(--gold2); }

    /* Pulse dot for active step */
    .step.active .step-icon::after {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gold2);
      animation: pulse 1s ease infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:0.4; transform:scale(0.6); }
    }

    /* Enter button */
    .enter-btn {
      margin-top: 1.8rem;
      padding: 0.85rem 3rem;
      background: transparent;
      border: 1.5px solid var(--gold);
      border-radius: 999px;
      color: var(--gold);
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      opacity: 0;
      transform: translateY(10px);
      transition: background 0.25s, color 0.25s, box-shadow 0.25s, opacity 0.5s, transform 0.5s;
      pointer-events: none;
    }
    .enter-btn.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }
    .enter-btn:hover {
      background: var(--gold);
      color: #0b0907;
      box-shadow: 0 0 30px rgba(212,170,80,0.35);
    }

    /* Version note */
    .version {
      position: fixed;
      bottom: 1.5rem;
      right: 1.8rem;
      font-size: 0.68rem;
      color: rgba(107,94,72,0.4);
      letter-spacing: 0.08em;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- Decorative staff lines -->
  <div class="staff-bg">
    <div class="staff-line"></div>
    <div class="staff-line"></div>
    <div class="staff-line"></div>
    <div class="staff-line"></div>
    <div class="staff-line"></div>
  </div>

  <div class="center">

    <div class="clef">𝄞</div>

    <h1 class="title">Teach Me <em>Music</em></h1>
    <p class="subtitle">Solfège adaptatif · DO3 → DO6</p>

    <div class="sep"></div>

    <div class="loading-block">

      <p class="status-text" id="status">Initialisation…</p>

      <div class="progress-wrap">
        <div class="progress-fill" id="progress"></div>
      </div>

      <div class="steps">
        <div class="step" id="step-1">
          <div class="step-icon">1</div>
          <span>Chargement du moteur audio</span>
        </div>
        <div class="step" id="step-2">
          <div class="step-icon">2</div>
          <span>Chargement du modèle de reconnaissance (CNN)</span>
        </div>
        <div class="step" id="step-3">
          <div class="step-icon">3</div>
          <span>Chargement du modèle adaptatif (Bandit)</span>
        </div>
        <div class="step" id="step-4">
          <div class="step-icon">4</div>
          <span>Préparation des exercices</span>
        </div>
      </div>

    </div>

    <button class="enter-btn" id="enter-btn" onclick="goToApp()">
      🎹 &nbsp; Commencer
    </button>

  </div>

  <div class="version">Teach Me Music v2.0 · CNN + Thompson Sampling</div>

  <script>
    const WARMUP_URL  = '/api/warmup/';
    const PLAY_URL    = '/play/';

    const progressEl = document.getElementById('progress');
    const statusEl   = document.getElementById('status');
    const enterBtn   = document.getElementById('enter-btn');

    function setProgress(pct) {
      progressEl.style.width = pct + '%';
    }

    function setStatus(text, done=false) {
      statusEl.textContent = text;
      if(done) statusEl.classList.add('ready');
    }

    function setStep(n, state) {
      // state: 'active' | 'done'
      const el = document.getElementById('step-' + n);
      el.classList.remove('active', 'done');
      el.classList.add(state);
      if(state === 'done') el.querySelector('.step-icon').textContent = '✓';
    }

    function showEnterBtn() {
      enterBtn.classList.add('show');
    }

    function goToApp() {
      window.location.href = PLAY_URL;
    }

    async function runLoading() {
      // Small delay so the page renders before we start
      await sleep(600);

      // ── Step 1: Audio engine ────────────────────────────────
      setStep(1, 'active');
      setStatus('Initialisation du moteur audio…');
      setProgress(10);
      await sleep(700);
      setStep(1, 'done');
      setProgress(25);

      // ── Step 2: CNN model warmup ────────────────────────────
      setStep(2, 'active');
      setStatus('Chargement du modèle CNN… (cela peut prendre quelques secondes)');
      setProgress(30);

      try {
        // Generate a minimal silent WAV (0.1s) to force model load
        const silentWav = makeSilentWav(0.5);
        const fd = new FormData();
        fd.append('audio', silentWav, 'warmup.wav');

        const res  = await fetch(WARMUP_URL, { method:'POST', body:fd });
        const data = await res.json();

        if(data.demo_mode) {
          setStep(2, 'done');
          setStatus('Modèle CNN : mode démonstration actif');
        } else {
          setStep(2, 'done');
          setStatus('Modèle CNN chargé avec succès ✓');
        }
      } catch(e) {
        setStep(2, 'done');
        setStatus('Modèle CNN : mode démonstration');
      }
      setProgress(65);
      await sleep(400);

      // ── Step 3: Bandit (instant — it's in session) ──────────
      setStep(3, 'active');
      setStatus('Chargement du modèle adaptatif…');
      setProgress(75);
      await sleep(600);
      setStep(3, 'done');
      setProgress(88);

      // ── Step 4: Exercises ready ─────────────────────────────
      setStep(4, 'active');
      setStatus('Préparation des exercices…');
      await sleep(500);
      setStep(4, 'done');
      setProgress(100);

      // ── All done ────────────────────────────────────────────
      await sleep(350);
      setStatus('Tout est prêt — bonne pratique ! 🎹', true);
      showEnterBtn();
    }

    // Build a minimal silent WAV blob (forces model to load server-side)
    function makeSilentWav(durationSec) {
      const SR      = 22050;
      const samples = Math.ceil(SR * durationSec);
      const dataLen = samples * 2;
      const ab      = new ArrayBuffer(44 + dataLen);
      const v       = new DataView(ab);
      const ws      = (o,s) => { for(let i=0;i<s.length;i++) v.setUint8(o+i,s.charCodeAt(i)); };
      ws(0,'RIFF');  v.setUint32(4,36+dataLen,true);
      ws(8,'WAVE');  ws(12,'fmt ');
      v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,1,true);
      v.setUint32(24,SR,true); v.setUint32(28,SR*2,true);
      v.setUint16(32,2,true);  v.setUint16(34,16,true);
      ws(36,'data'); v.setUint32(40,dataLen,true);
      // all zeros = silence
      return new Blob([ab], { type:'audio/wav' });
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    // Start after fonts + page render
    window.addEventListener('load', runLoading);
  </script>
</body>
</html>
